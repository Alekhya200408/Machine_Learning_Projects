<!DOCTYPE html>
<html>
<head>
    <title>Addiction Predictor</title>
</head>
<body>

<h2>Addiction Prediction</h2>

<form id="form">
    <input type="number" id="daily" placeholder="Daily Usage Hours"><br><br>
    <input type="number" id="social" placeholder="Social Media"><br><br>
    <input type="number" id="gaming" placeholder="Gaming"><br><br>
    <input type="number" id="education" placeholder="Education"><br><br>
    <input type="number" id="sleep" placeholder="Sleep Hours"><br><br>
    <input type="number" id="checks" placeholder="Phone Checks"><br><br>
    <input type="number" id="screen" placeholder="Screen Before Bed"><br><br>
    <input type="number" id="weekend" placeholder="Weekend Usage"><br><br>
    <input type="number" id="academic" placeholder="Academic Performance"><br><br>

    <button type="submit">Predict</button>
</form>

<h3 id="result"></h3>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        daily: document.getElementById("daily").value,
        social: document.getElementById("social").value,
        gaming: document.getElementById("gaming").value,
        education: document.getElementById("education").value,
        sleep: document.getElementById("sleep").value,
        checks: document.getElementById("checks").value,
        screen: document.getElementById("screen").value,
        weekend: document.getElementById("weekend").value,
        academic: document.getElementById("academic").value
    };

    const response = await fetch("http://localhost:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
        "Prediction: " + result.result;
});
</script>

</body>
</html>
